spring:
  application:
    name: chat
  threads:
    virtual:
      enabled: true # MVC + 가상 스레드 (DESIGN.md §1-3)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080
  # WS 연결 드레인은 preStop 훅과 조합한다 (DESIGN.md §7)
  shutdown: graceful

aws:
  region: ${AWS_REGION:ap-northeast-2}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true # EKS liveness/readiness
